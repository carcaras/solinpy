name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install ruff mypy pytest types-requests

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy solinpy

      - name: Run tests
        run: pytest
