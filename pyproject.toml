[project]
name = "solinpy"
version = "0.1.0"
description = "Python SDK for Solana"
authors = [{ name = "Carcará Team" }]
requires-python = ">=3.10"

dependencies = [
    "base58"
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true