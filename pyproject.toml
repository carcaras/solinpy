[project]
name = "SolInPy"
version = "0.1.0"
description = "Python Framework for Solana"
authors = [{ name = "SolInPy Team" }]
requires-python = ">=3.10"

dependencies = []

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true

[tool.setuptools.packages.find]
include = ["solinpy*"]